<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F1E35"/>

  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.04"/>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F7F2E9" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Waveform logo mark — large, left-center -->
  <g transform="translate(120, 235)">
    <rect x="0"   y="46" width="22" height="68"  rx="11" fill="#F7F2E9" opacity="0.9"/>
    <rect x="34"  y="24" width="22" height="112" rx="11" fill="#F7F2E9"/>
    <rect x="68"  y="0"  width="22" height="160" rx="11" fill="#F7F2E9"/>
    <rect x="102" y="24" width="22" height="112" rx="11" fill="#F7F2E9"/>
    <rect x="136" y="46" width="22" height="68"  rx="11" fill="#F7F2E9" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <text x="320" y="290" font-family="Georgia, serif" font-size="88" font-weight="300"
        fill="#F7F2E9" letter-spacing="-2">LingoScribe</text>

  <!-- Tagline -->
  <text x="321" y="355" font-family="system-ui, sans-serif" font-size="32" font-weight="300"
        fill="#F7F2E9" opacity="0.65" letter-spacing="0.5">AI speech to text for Urdu &amp; Punjabi</text>

  <!-- Feature pills -->
  <g transform="translate(321, 410)">
    <!-- Transcription pill -->
    <rect width="178" height="40" rx="20" fill="#F7F2E9" opacity="0.1"/>
    <text x="89" y="26" font-family="system-ui, sans-serif" font-size="18" fill="#F7F2E9"
          text-anchor="middle" opacity="0.8">Transcription</text>

    <!-- Translation pill -->
    <rect x="195" width="170" height="40" rx="20" fill="#F7F2E9" opacity="0.1"/>
    <text x="280" y="26" font-family="system-ui, sans-serif" font-size="18" fill="#F7F2E9"
          text-anchor="middle" opacity="0.8">Translation</text>

    <!-- AI Insights pill -->
    <rect x="382" width="155" height="40" rx="20" fill="#F7F2E9" opacity="0.1"/>
    <text x="459" y="26" font-family="system-ui, sans-serif" font-size="18" fill="#F7F2E9"
          text-anchor="middle" opacity="0.8">AI Insights</text>
  </g>

  <!-- URL watermark -->
  <text x="1180" y="610" font-family="system-ui, sans-serif" font-size="22" fill="#F7F2E9"
        opacity="0.3" text-anchor="end">lingoscribe-frontend.vercel.app</text>
</svg>
